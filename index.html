<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script>
fetch("./config.json")
  .then(r => {
    console.log("status:", r.status);
    return r.json();
  })
  .then(async cfg => {
    console.log("config:", cfg);
    try {
      await fetch(cfg.redirect, { mode: "no-cors" });
      location.replace(cfg.redirect);
    } catch (e) {
      document.body.innerHTML = "<h1>🚧 维护中</h1><p>服务器暂时不可用，请稍后再试。</p>";
    }
  })
  .catch(e => {
    console.error(e);
    document.body.innerText = "Config load failed: " + e;
  });
</script>
</head>
<body></body>
</html>
