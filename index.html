<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    fetch("./config.json")
      .then(r => r.json())
      .then(cfg => {
        location.replace(cfg.redirect);
      })
      .catch(() => {
        document.body.innerText = "Redirect config load failed.";
      });
  </script>
</head>
<body>
</body>
</html>
